version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # CodeQL steps exchange state and reject mixed action versions.
      codeql-action:
        patterns:
          - "github/codeql-action/*"
