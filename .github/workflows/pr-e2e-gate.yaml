name: E2E / PR Gate

on:
  workflow_run:
    workflows: ["CI / Pull Request"]
    types: [completed]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, closed]
  workflow_dispatch:
    inputs:
      operation:
        description: Exact-head exception type to record.
        required: true
        default: resolve-fork
        type: choice
        options:
          - resolve-fork
          - resolve-control-plane
      pr_number:
        description: Pull request number to resolve.
        required: true
        type: string
      expected_head_sha:
        description: Exact 40-character PR head SHA reviewed by the maintainer.
        required: true
        type: string
      waiver_reason:
        description: Why credentialed E2E cannot be run safely for this revision.
        required: true
        type: string
      evidence_url:
        description: Optional maintainer-supplied NVIDIA/NemoClaw Actions reference.
        required: false
        default: ""
        type: string

permissions: {}

jobs:
  initialize:
    if: ${{ github.event_name == 'pull_request_target' && github.repository == 'NVIDIA/NemoClaw' && github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
    concurrency:
      group: pr-e2e-gate-seed-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
      cancel-in-progress: false
    steps:
      - name: Checkout controller
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "22"

      - name: Install controller dependencies
        run: npm ci --ignore-scripts

      - name: Reserve exact-head gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: >-
          node --experimental-strip-types tools/e2e/pr-e2e-gate.mts
          --mode seed
          --pr "$PR_NUMBER"
          --head "$HEAD_SHA"

  cancel-superseded:
    if: ${{ github.event_name == 'pull_request_target' && github.repository == 'NVIDIA/NemoClaw' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout controller
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "22"

      - name: Install controller dependencies
        run: npm ci --ignore-scripts

      - name: Cancel superseded E2E runs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: >-
          node --experimental-strip-types tools/e2e/pr-e2e-gate.mts
          --mode cancel
          --pr "$PR_NUMBER"

  coordinate:
    if: ${{ github.event_name == 'workflow_run' && github.repository == 'NVIDIA/NemoClaw' && github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      actions: write
      checks: write
      contents: read
      pull-requests: read
    concurrency:
      group: pr-e2e-gate-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
      # Let the previous coordinator observe E2E cancellation and close its check.
      cancel-in-progress: false
    steps:
      - name: Checkout controller
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "22"

      - name: Install controller dependencies
        run: npm ci --ignore-scripts

      - id: workspace
        name: Create private workspace
        shell: bash
        run: |
          set -euo pipefail
          work_dir="$(mktemp -d "${RUNNER_TEMP}/nemoclaw-pr-e2e-gate.XXXXXX")"
          chmod 700 "$work_dir"
          printf 'work_dir=%s\n' "$work_dir" >> "$GITHUB_OUTPUT"

      - id: start
        name: Start evaluation
        env:
          CI_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          CI_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          WORK_DIR: ${{ steps.workspace.outputs.work_dir }}
        run: >-
          node --experimental-strip-types tools/e2e/pr-e2e-gate.mts
          --mode start
          --head "$HEAD_SHA"
          --head-repo "$HEAD_REPOSITORY"
          --head-branch "$HEAD_BRANCH"
          --workflow-sha "$WORKFLOW_SHA"
          --ci-conclusion "$CI_CONCLUSION"
          --ci-run-attempt "$CI_RUN_ATTEMPT"
          --ci-run-id "$CI_RUN_ID"
          --pr "$PR_NUMBER"
          --work-dir "$WORK_DIR"

      - name: Upload risk plan
        if: ${{ always() && steps.workspace.outputs.work_dir != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-e2e-risk-plan-${{ github.event.workflow_run.head_sha }}
          path: ${{ steps.workspace.outputs.work_dir }}/risk-plan.json
          if-no-files-found: ignore
          retention-days: 14

      - id: wait
        name: Wait for E2E run
        if: ${{ steps.start.outputs.dispatched == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.start.outputs.run_id }}
        run: |
          wait_status=0
          timeout --signal=TERM --kill-after=30s 105m bash -s <<'WAIT' || wait_status=$?
          set -euo pipefail

          if [[ ! "$RUN_ID" =~ ^[1-9][0-9]*$ ]]; then
            printf '::error title=Invalid run ID::The controller did not provide a positive numeric run ID.\n' >&2
            exit 1
          fi

          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"
          last_state=""
          while true; do
            if ! state="$(
              gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" \
                --json status,conclusion \
                --jq '.status + ":" + (if (.conclusion == null or .conclusion == "") then "none" else .conclusion end)'
            )"; then
              printf '::error title=Run status query failed::Unable to query run %s. %s\n' \
                "$RUN_ID" "$run_url" >&2
              exit 1
            fi

            if [[ "$state" != "$last_state" ]]; then
              case "$state" in
                queued:none | in_progress:none | requested:none | waiting:none | pending:none)
                  printf 'Run %s status=%s url=%s\n' \
                    "$RUN_ID" "${state%%:*}" "$run_url"
                  ;;
                completed:success)
                  printf 'Run %s status=completed conclusion=success url=%s\n' \
                    "$RUN_ID" "$run_url"
                  ;;
                completed:failure | completed:cancelled | completed:timed_out | completed:action_required | completed:neutral | completed:skipped | completed:stale | completed:startup_failure)
                  printf '::error title=E2E run failed::Run %s completed with conclusion %s. %s\n' \
                    "$RUN_ID" "${state#*:}" "$run_url" >&2
                  ;;
                *)
                  printf '::error title=Unexpected run state::Run %s returned an unsupported status/conclusion pair. %s\n' \
                    "$RUN_ID" "$run_url" >&2
                  ;;
              esac
              last_state="$state"
            fi

            case "$state" in
              queued:none | in_progress:none | requested:none | waiting:none | pending:none)
                sleep 10
                ;;
              completed:success)
                exit 0
                ;;
              *)
                exit 1
                ;;
            esac
          done
          WAIT

          if [ "$wait_status" -eq 124 ]; then
            printf '::error title=E2E run timed out::The run did not complete within 105 minutes.\n' >&2
          fi
          exit "$wait_status"

      - id: evidence
        name: Download evidence
        if: ${{ always() && steps.start.outputs.dispatched == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.start.outputs.run_id }}
        run: |
          set -euo pipefail
          download_status=0
          timeout --signal=TERM --kill-after=30s 10m \
            gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" \
              --dir "${{ steps.workspace.outputs.work_dir }}/evidence" || download_status=$?
          if [ "$download_status" -eq 124 ]; then
            printf '::error title=Evidence download timed out::Artifact download exceeded 10 minutes.\n' >&2
          fi
          exit "$download_status"

      - id: finish
        name: Verify evidence
        if: ${{ always() && steps.start.outputs.dispatched == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node --experimental-strip-types tools/e2e/pr-e2e-gate.mts
          --mode finish
          --work-dir "${{ steps.workspace.outputs.work_dir }}"
          --state-hash "${{ steps.start.outputs.state_hash }}"
          --check-id "${{ steps.start.outputs.check_id }}"
          --run-id "${{ steps.start.outputs.run_id }}"

      - name: Close incomplete check
        if: ${{ always() && steps.start.outputs.check_id != '' && steps.start.outputs.finalized != 'true' && steps.finish.outputs.finalized != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node --experimental-strip-types tools/e2e/pr-e2e-gate.mts
          --mode abandon
          --check-id "${{ steps.start.outputs.check_id }}"
          --run-id "${{ steps.start.outputs.run_id }}"

      - name: Remove private workspace
        if: ${{ always() && steps.workspace.outputs.work_dir != '' }}
        run: rm -rf -- "${{ steps.workspace.outputs.work_dir }}"

  resolve-exception:
    if: ${{ github.event_name == 'workflow_dispatch' && github.repository == 'NVIDIA/NemoClaw' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      checks: write
      contents: read
      pull-requests: read
    concurrency:
      group: pr-e2e-gate-resolve-${{ inputs.operation }}-${{ inputs.pr_number }}
      cancel-in-progress: false
    steps:
      - name: Checkout controller
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "22"

      - name: Install controller dependencies
        run: npm ci --ignore-scripts

      - name: Record E2E exception
        env:
          EVIDENCE_URL: ${{ inputs.evidence_url }}
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          GITHUB_TOKEN: ${{ github.token }}
          MAINTAINER: ${{ github.triggering_actor }}
          OPERATION: ${{ inputs.operation }}
          PR_NUMBER: ${{ inputs.pr_number }}
          WAIVER_REASON: ${{ inputs.waiver_reason }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: >-
          node --experimental-strip-types tools/e2e/pr-e2e-gate.mts
          --mode "$OPERATION"
          --pr "$PR_NUMBER"
          --head "$EXPECTED_HEAD_SHA"
          --workflow-sha "$WORKFLOW_SHA"
          --maintainer "$MAINTAINER"
          --reason "$WAIVER_REASON"
          --evidence-url "$EVIDENCE_URL"
